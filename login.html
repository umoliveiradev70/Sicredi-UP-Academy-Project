<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Sicredi Up Academy</title>
  <meta name="description" content="Faça login na plataforma Sicredi Up Academy.">
  <link rel="icon" type="image/png" href="logo1.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="globalParticles" class="global-particles" aria-hidden="true"></canvas>

  <nav id="navbar" class="navbar scrolled" role="navigation" aria-label="Navegação principal">
    <div class="nav-container">
      <a href="index.html" class="nav-logo" aria-label="Home"><img src="logo1.png" alt="Logo" class="nav-logo-img" width="140" height="48"></a>
      <ul class="nav-links" id="navLinks" role="menubar">
        <li role="none"><a href="index.html" class="nav-link" role="menuitem">Home</a></li>
        <li role="none"><a href="index.html#campeonatos" class="nav-link" role="menuitem">Campeonatos</a></li>
        <li role="none"><a href="up-rewards.html" class="nav-link nav-link--rewards" role="menuitem">UP Rewards</a></li>
        <li role="none"><a href="index.html#faq" class="nav-link" role="menuitem">FAQ</a></li>
      </ul>
      <div id="nav-auth" class="nav-auth"></div>
      <button class="nav-hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="auth-page">
    <div class="auth-glow-1" aria-hidden="true"></div>
    <div class="auth-glow-2" aria-hidden="true"></div>

    <div class="auth-container">
      <div class="auth-card animate-on-scroll">
        <div class="auth-header">
          <a href="index.html" class="auth-logo" aria-label="Home">
            <img src="logo1.png" alt="Up Academy" width="120" height="40">
          </a>
          <h1 class="auth-title">Bem-vindo de volta</h1>
          <p class="auth-subtitle">Acesse sua conta para continuar</p>
        </div>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="auth-group">
            <label for="login-email" class="form-label">E-mail</label>
            <input type="email" id="login-email" class="form-input" placeholder="seu@email.com" required autocomplete="email">
            <span class="form-error" id="login-email-error" role="alert"></span>
          </div>

          <div class="auth-group">
            <label for="login-senha" class="form-label">Senha</label>
            <div class="auth-password-wrap">
              <input type="password" id="login-senha" class="form-input" placeholder="Sua senha" required autocomplete="current-password">
              <button type="button" class="auth-toggle-pass" aria-label="Mostrar senha" data-target="login-senha">
                <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" x2="23" y1="1" y2="23"/></svg>
              </button>
            </div>
            <span class="form-error" id="login-senha-error" role="alert"></span>
          </div>

          <label class="auth-checkbox-label">
            <input type="checkbox" id="login-lembrar" class="form-checkbox">
            <span class="checkbox-custom" aria-hidden="true"></span>
            <span class="checkbox-text">Lembrar-me</span>
          </label>

          <button type="submit" class="btn btn-primary btn-submit" id="loginBtn">
            <span class="btn-submit-text">Entrar</span>
            <svg class="btn-submit-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
            <svg class="btn-submit-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </button>
        </form>

        <div class="auth-divider"><span>ou continue com</span></div>

        <button id="googleLoginBtn" class="auth-social-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.28-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span>Entrar com Google</span>
        </button>

        <div class="auth-footer-links">
          <a href="recuperar-senha.html" class="auth-link">Esqueci minha senha</a>
          <span class="auth-link-sep">·</span>
          <a href="cadastro.html" class="auth-link">Criar Conta</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer" role="contentinfo">
    <div class="container"><div class="footer-bottom"><p>&copy; 2025 Sicredi Up Academy. Todos os direitos reservados.</p></div></div>
  </footer>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
